<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Analysis & Meeting Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans">

  <!-- Header -->
  <header class="border-b border-slate-800 bg-slate-950/50 backdrop-blur sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="p-2 bg-indigo-600 rounded-lg text-white">
          <i class="fa-solid fa-wand-magic-sparkles text-xl"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-violet-400 bg-clip-text text-transparent">
             Video Analysis Assistant
          </h1>
          <p class="text-xs text-slate-400">Summaries, Action Items & Chat</p>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Layout -->
  <main class="max-w-7xl mx-auto w-full px-6 py-8 flex-1 grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <!-- Left Column: Input Form & Insights Tabs (8 Cols) -->
    <div class="lg:col-span-7 flex flex-col space-y-6">
      
      <!-- Input Card -->
      <div class="bg-slate-800/60 border border-slate-700/60 rounded-xl p-6 shadow-xl backdrop-blur-sm">
        <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
          <i class="fa-solid fa-link text-indigo-400"></i> Process New Source
        </h2>
        
        <form id="process-form" class="space-y-4">
          <div>
            <label class="block text-xs text-slate-400 mb-1">YouTube URL or Local File Path</label>
            <input 
              type="text" 
              id="source-input" 
              required
              placeholder="https://www.youtube.com/watch?v=... or /path/to/file.mp3"
              class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
            />
          </div>

          <div class="flex items-center justify-between gap-4">
            <div class="w-1/2">
              <label class="block text-xs text-slate-400 mb-1">Language</label>
              <select id="language-input" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
                <option value="english">English</option>
                <option value="hinglish">Hinglish</option>
              </select>
            </div>

            <div class="w-1/2 flex items-end">
              <button 
                type="submit" 
                id="submit-btn"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 rounded-lg text-sm transition flex items-center justify-center gap-2 shadow-lg shadow-indigo-600/20"
              >
                <span>Analyze Video</span>
                <i class="fa-solid fa-arrow-right"></i>
              </button>
            </div>
          </div>
        </form>

        <!-- Loader -->
        <div id="loader" class="hidden mt-6 text-center py-6 border-t border-slate-700/50">
          <i class="fa-solid fa-circle-notch fa-spin text-indigo-400 text-3xl mb-3"></i>
          <p class="text-sm text-slate-300 font-medium">Processing & Transcribing...</p>
          <p class="text-xs text-slate-500 mt-1">This may take a minute depending on duration.</p>
        </div>
      </div>

      <!-- Results Card (Tabs) -->
      <div id="results-container" class="hidden bg-slate-800/60 border border-slate-700/60 rounded-xl p-6 shadow-xl flex-1 flex flex-col">
        <div class="border-b border-slate-700 pb-3 mb-4">
          <span class="text-xs uppercase tracking-wider text-indigo-400 font-semibold">Generated Title</span>
          <h2 id="res-title" class="text-xl font-bold text-slate-100 mt-1"></h2>
        </div>

        <!-- Tab Buttons -->
        <div class="flex space-x-2 border-b border-slate-700/80 mb-4 overflow-x-auto text-sm">
          <button onclick="switchTab('summary')" id="tab-summary" class="tab-btn pb-2 border-b-2 border-indigo-500 text-indigo-400 font-medium px-2">Summary</button>
          <button onclick="switchTab('actions')" id="tab-actions" class="tab-btn pb-2 border-b-2 border-transparent text-slate-400 hover:text-slate-200 font-medium px-2">Action Items</button>
          <button onclick="switchTab('decisions')" id="tab-decisions" class="tab-btn pb-2 border-b-2 border-transparent text-slate-400 hover:text-slate-200 font-medium px-2">Decisions</button>
          <button onclick="switchTab('questions')" id="tab-questions" class="tab-btn pb-2 border-b-2 border-transparent text-slate-400 hover:text-slate-200 font-medium px-2">Questions</button>
          <button onclick="switchTab('transcript')" id="tab-transcript" class="tab-btn pb-2 border-b-2 border-transparent text-slate-400 hover:text-slate-200 font-medium px-2">Transcript</button>
        </div>

        <!-- Tab Panes -->
        <div class="text-slate-300 text-sm leading-relaxed whitespace-pre-wrap overflow-y-auto max-h-96 pr-2">
          <div id="pane-summary" class="tab-pane"></div>
          <div id="pane-actions" class="tab-pane hidden"></div>
          <div id="pane-decisions" class="tab-pane hidden"></div>
          <div id="pane-questions" class="tab-pane hidden"></div>
          <div id="pane-transcript" class="tab-pane hidden font-mono text-xs bg-slate-900 p-4 rounded-lg border border-slate-800"></div>
        </div>
      </div>

    </div>

    <!-- Right Column: Interactive Chat UI (5 Cols) -->
    <div class="lg:col-span-5 flex flex-col h-[650px] bg-slate-800/60 border border-slate-700/60 rounded-xl shadow-xl overflow-hidden">
      
      <!-- Chat Header -->
      <div class="p-4 bg-slate-900/80 border-b border-slate-700/80 flex items-center gap-3">
        <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
        <h3 class="font-semibold text-sm">Ask Questions</h3>
      </div>

      <!-- Messages Window -->
      <div id="chat-box" class="flex-1 p-4 space-y-4 overflow-y-auto text-sm">
        <div class="bg-slate-700/40 border border-slate-700/60 p-3 rounded-lg text-slate-400 text-xs text-center">
          Process a video on the left to start asking interactive questions about the content.
        </div>
      </div>

      <!-- Chat Input Form -->
      <form id="chat-form" class="p-4 bg-slate-900/80 border-t border-slate-700/80 flex gap-2">
        <input 
          type="text" 
          id="chat-input" 
          disabled
          placeholder="Ask a question..." 
          class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 text-slate-200 disabled:opacity-50"
        />
        <button 
          type="submit" 
          id="chat-btn"
          disabled
          class="bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-700 text-white px-4 py-2 rounded-lg transition"
        >
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </form>

    </div>

  </main>

  <script>
    // Tab Handler
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('border-indigo-500', 'text-indigo-400');
        btn.classList.add('border-transparent', 'text-slate-400');
      });
      document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.add('hidden'));

      document.getElementById(`tab-${tab}`).classList.add('border-indigo-500', 'text-indigo-400');
      document.getElementById(`pane-${tab}`).classList.remove('hidden');
    }

    // Process Form Submit
    document.getElementById('process-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const source = document.getElementById('source-input').value;
      const language = document.getElementById('language-input').value;

      document.getElementById('loader').classList.remove('hidden');
      document.getElementById('results-container').classList.add('hidden');
      document.getElementById('submit-btn').disabled = true;

      try {
        const res = await fetch('/api/process', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ source, language })
        });
        const data = await res.json();

        if (res.ok && data.success) {
          const result = data.data;
          document.getElementById('res-title').innerText = result.title;
          document.getElementById('pane-summary').innerText = result.summary;
          document.getElementById('pane-actions').innerText = result.action_items;
          document.getElementById('pane-decisions').innerText = result.key_decisions;
          document.getElementById('pane-questions').innerText = result.open_questions;
          document.getElementById('pane-transcript').innerText = result.transcript;

          document.getElementById('results-container').classList.remove('hidden');

          // Enable chat
          document.getElementById('chat-input').disabled = false;
          document.getElementById('chat-btn').disabled = false;
          appendChatMessage('system', 'RAG Engine Ready! Ask me anything about this video.');
        } else {
          alert('Error: ' + (data.error || 'Failed to process request'));
        }
      } catch (err) {
        alert('An unexpected error occurred.');
      } finally {
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('submit-btn').disabled = false;
      }
    });

    // Chat Handler
    document.getElementById('chat-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('chat-input');
      const question = input.value.trim();
      if (!question) return;

      appendChatMessage('user', question);
      input.value = '';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        const data = await res.json();

        if (res.ok) {
          appendChatMessage('assistant', data.answer);
        } else {
          appendChatMessage('assistant', 'Error: ' + data.error);
        }
      } catch (err) {
        appendChatMessage('assistant', 'Error reaching server.');
      }
    });

    function appendChatMessage(role, text) {
      const box = document.getElementById('chat-box');
      const msg = document.createElement('div');
      msg.className = `p-3 rounded-lg max-w-[85%] text-sm ${
        role === 'user' 
          ? 'bg-indigo-600 text-white ml-auto' 
          : role === 'system'
          ? 'bg-slate-700/50 text-indigo-300 text-center mx-auto'
          : 'bg-slate-700 text-slate-100 border border-slate-600'
      }`;
      msg.innerText = text;
      box.appendChild(msg);
      box.scrollTop = box.scrollHeight;
    }
  </script>
</body>
</html>
